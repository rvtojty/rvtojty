<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>❤️ my all i have ❤️</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:#ff9a9e;
}

/* إخفاء الصفحات */
#messagePage,#site{display:none;}

button,input{
    padding:10px;
    margin:10px;
}
</style>
</head>

<body>

<!-- لوجين -->
<div id="login">
    <h2>🔐 اكتبي الباسورد</h2>
    <input type="password" id="pass">
    <button onclick="login()">دخول</button>
    <div id="err" style="color:red;display:none;">غلط 😢</div>
</div>

<!-- رسالة -->
<div id="messagePage">
    <h2 id="text"></h2>
</div>

<!-- الموقع -->
<div id="site">
    <h1>❤️ my all i have ❤️</h1>
    <p>بحبك وبموت فيكي</p>

    <button onclick="toggleMusic()">🔊 صوت</button>
    <button onclick="love()">❤️ بحبك</button>

    <br>
    <img src="myphoto.jpeg" width="250">
</div>

<audio id="music">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
function login(){
    if(document.getElementById("pass").value==="1"){
        document.getElementById("login").style.display="none";
        document.getElementById("messagePage").style.display="block";

        let msg="بحبك ❤️";
        let i=0;

        function type(){
            if(i<msg.length){
                document.getElementById("text").innerHTML+=msg[i];
                i++;
                setTimeout(type,80);
            }else{
                setTimeout(()=>{
                    document.getElementById("messagePage").style.display="none";
                    document.getElementById("site").style.display="block";
                },800);
            }
        }
        type();

        document.getElementById("music").play().catch(()=>{});
    }else{
        document.getElementById("err").style.display="block";
    }
}

function toggleMusic(){
    let m=document.getElementById("music");
    m.paused ? m.play() : m.pause();
}

function love(){
    alert("بحبك جدًا ❤️");
}
</script>

</body>
</html>
