<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>❤️ my all i have ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* لوجين */
#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    padding:30px;
    border-radius:20px;
}
input,button{
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
}

/* رسالة */
#messagePage{
    position:fixed;
    inset:0;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:26px;
    padding:20px;
}

/* الموقع */
#site{
    display:none;
}

img{
    width:250px;
    border-radius:20px;
    margin-top:20px;
}

/* قلوب */
.heart{
    position:fixed;
    font-size:20px;
    animation:up 3s linear;
}
@keyframes up{
    from{transform:translateY(0);opacity:1;}
    to{transform:translateY(-100vh);opacity:0;}
}
</style>
</head>

<body>

<!-- لوجين -->
<div id="login">
    <div class="box">
        <h2>🔐 احلي بقره اكتبي الباسوورد</h2>
        <input type="password" id="pass">
        <button onclick="login()">دخول</button>
        <div id="err" style="color:red;display:none;">غلط 😢</div>
    </div>
</div>

<!-- رسالة -->
<div id="messagePage">
    <div id="text"></div>
</div>

<!-- الموقع -->
<div id="site">
    <h1>❤️ my all i have ❤️</h1>
    <p>بحبك وبموت فيكي</p>

    <button onclick="loveBoom()">❤️ بحبك</button>
    <button onclick="toggleMusic()">🔊 صوت</button>

    <br>
    <img src="myphoto.jpeg">
</div>

<audio id="music">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>

// ===== عناصر =====
let music=document.getElementById("music");

// ===== لوجين =====
function login(){
    let pass=document.getElementById("pass").value;

    if(pass==="1"){
        document.getElementById("login").style.display="none";
        document.getElementById("messagePage").style.display="flex";
        startTyping();

        // تشغيل الصوت (بعد تفاعل)
        music.play().catch(()=>{});
    }else{
        document.getElementById("err").style.display="block";
    }
}

// ===== كتابة =====
let msg="انتي أجمل حاجة في حياتي ❤️";
let i=0;

function startTyping(){
    let textDiv=document.getElementById("text");
    textDiv.innerHTML="";

    function type(){
        if(i<msg.length){
            textDiv.innerHTML+=msg[i];
            i++;
            setTimeout(type,70);
        }else{
            setTimeout(()=>{
                document.getElementById("messagePage").style.display="none";
                document.getElementById("site").style.display="block";
            },800);
        }
    }
    type();
}

// ===== صوت =====
function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

// ===== قلوب =====
function loveBoom(){
    for(let i=0;i<15;i++){
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";
        h.style.bottom="0";
        document.body.appendChild(h);

        setTimeout(()=>h.remove(),3000);
    }
}

</script>

</body>
</html>
