<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ بحبك ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #333;
            transition: all 0.5s ease;
        }

        body.night {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #1a252f 100%);
            color: #ecf0f1;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            pointer-events: none;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        #loveText {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            font-weight: bold;
            opacity: 0;
            transition: all 1s ease;
            z-index: 999;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #loveText.showLove {
            opacity: 1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }

        /* Login Page */
        #login {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
        }

        body.night #login {
            background: rgba(52, 73, 94, 0.9);
        }

        .box {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: slideIn 0.8s ease forwards;
        }

        body.night .box {
            background: #34495e;
        }

        @keyframes slideIn {
            to { transform: scale(1); }
        }

        .box h2 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: #e74c3c;
        }

        body.night .box h2 {
            color: #e67e22;
        }

        input[type="password"] {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        button {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.4);
        }

        #error {
            display: none;
            color: #e74c3c;
            margin-top: 1rem;
            font-weight: bold;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Message Page */
        #messagePage {
            display: none;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
        }

        body.night #messagePage {
            background: rgba(44, 62, 80, 0.95);
        }

        #typeText {
            font-size: 1.6rem;
            line-height: 1.8;
            max-width: 600px;
            padding: 2rem;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            white-space: pre-wrap;
        }
