<body>

<div class="hearts" id="hearts"></div>
<div id="loveText">❤️ بحبك ❤️</div>

<!-- صفحة الدخول -->
<div id="login">
    <div class="box">
        <h2>🔐 احلي بقره اكتبي الباسوورد</h2>
        <input type="password" id="password" placeholder="الباسورد">
        <button id="loginBtn">دخول</button>
        <div id="error">الباسورد غلط 😢</div>
    </div>
</div>

<!-- صفحة الرسالة -->
<div id="messagePage">
    <div id="typeText"></div>
</div>

<!-- الموقع -->
<div id="siteWithoutPhotos">

<audio id="music" loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<header>
    <h1>❤️ my all i have ❤️</h1>
    <p>بحبك وبموت فيكي</p>
    <div class="counter" id="counter"></div>

    <!-- زر الصوت -->
    <button onclick="toggleMusic()">🔊 تشغيل / كتم</button>
</header>

<div id="photoButton" onclick="showPhotos()">
    <img src="myphoto.jpeg">
    <div>😂❤️دوسي عليا</div>
</div>

<section id="photos">
    <h2>صورنا 📸</h2>
    <img src="image1.jpeg"><img src="image2.jpeg"><img src="image3.jpeg">
</section>

</div>

<script>
// ====== العناصر ======
const loginBtn=document.getElementById("loginBtn");
const password=document.getElementById("password");
const login=document.getElementById("login");
const error=document.getElementById("error");
const messagePage=document.getElementById("messagePage");
const typeText=document.getElementById("typeText");
const siteWithoutPhotos=document.getElementById("siteWithoutPhotos");
const music=document.getElementById("music");
const loveText=document.getElementById("loveText");
const hearts=document.getElementById("hearts");
const counter=document.getElementById("counter");

// ====== رسالة ======
const message =
"ريتاج…\n\n" +
"في لحظة بسيطة\n" +
"دخلتي حياتي وغيرتيها\n" +
"ضحكتك أمان\n" +
"وصوتك راحة\n\n" +
"ومع كل ثانية…\n" +
"بحبك أكتر ❤️";

let i=0;

// ====== دخول ======
loginBtn.onclick = startLogin;

password.addEventListener("keypress", function(e){
    if(e.key==="Enter") startLogin();
});

password.oninput = ()=> error.style.display="none";

function startLogin(){
    if(password.value==="1"){
        login.style.display="none";
        messagePage.style.display="flex";
        typeText.innerHTML="";
        i=0;
        typeWriter();

        // تشغيل الصوت بعد التفاعل
        music.play().catch(()=>{});
    }else{
        error.style.display="block";
    }
}

// ====== كتابة ======
function typeWriter(){
    if(i<message.length){
        typeText.innerHTML += message[i]==="\n" ? "<br>" : message[i];
        i++;
        setTimeout(typeWriter,70);
    }else{
        setTimeout(()=>{
            messagePage.style.display="none";
            siteWithoutPhotos.style.display="block";
            loveText.classList.add("showLove");
        },500);
    }
}

// ====== صور ======
function showPhotos(){
    document.getElementById("photos").style.display="block";
}

// ====== صوت ======
function toggleMusic(){
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

// ====== عداد ======
const start=new Date("2024-08-25T03:00:00");
setInterval(()=>{
    const diff=new Date()-start;
    const d=Math.floor(diff/86400000);
    const h=Math.floor(diff/3600000)%24;
    const m=Math.floor(diff/60000)%60;
    counter.innerHTML=`نعرف بعض من ${d} يوم و ${h} ساعة و ${m} دقيقة ❤️`;
},1000);

// ====== قلوب ======
function createHeart(){
    const el=document.createElement("div");
    el.className="heart";
    el.innerHTML="❤️";
    el.style.left=Math.random()*100+"vw";
    el.style.fontSize=15+Math.random()*25+"px";
    el.style.animationDuration=6+Math.random()*4+"s";
    hearts.appendChild(el);
    setTimeout(()=>el.remove(),10000);
}
setInterval(createHeart,400);

// ====== ليل ======
const hour = new Date().getHours();
if(hour >=18 || hour <6) document.body.classList.add("night");
</script>

</body>
