<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>❤️ My Soulmate ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow-x:hidden;
    transition:0.5s;
}

.hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
}
.heart{
    position:absolute;
    animation:float 8s linear infinite;
}
@keyframes float{
    0%{transform:translateY(110vh);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

#login{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:350px;
}
input,button{
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:none;
    width:90%;
    margin:10px 0;
}
button{
    background:#ff9a9e;
    color:white;
    cursor:pointer;
}
#error{color:red;display:none;}

#messagePage{
    position:fixed;
    inset:0;
    background:radial-gradient(circle,#111,#000);
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}
#typeText{
    font-size:28px;
    line-height:1.8;
    max-width:650px;
}

#site{
    display:none;
}

header{
    background:rgba(255,255,255,0.85);
    padding:30px;
}

.counter{margin-top:10px;}

img{
    width:90%;
    max-width:300px;
    border-radius:15px;
    margin:10px;
}
.memory{
    background:white;
    padding:15px;
    margin:10px auto;
    border-radius:15px;
    max-width:500px;
}

#photoButton{
    position:relative;
    width:200px;
    margin:20px auto;
    cursor:pointer;
}
#photoButton img{
    width:100%;
    border-radius:20px;
}
#photoButton div{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<!-- login -->
<div id="login">
    <div class="box">
        <h2>🔐 الباسورد</h2>
        <input type="password" id="password" placeholder="اكتب الباسورد">
        <button id="loginBtn">دخول</button>
        <div id="error">غلط 😢</div>
    </div>
</div>

<!-- message -->
<div id="messagePage">
    <div id="typeText"></div>
</div>

<!-- site -->
<div id="site">

<audio id="music" loop preload="auto">
    <source src="love.mp3" type="audio/mpeg">
</audio>

<header>
    <h1>❤️ My Soulmate ❤️</h1>
    <div class="counter" id="counter"></div>
</header>

<div id="photoButton" onclick="showPhotos()">
    <img src="myphoto.png">
    <div>دوس ❤️</div>
</div>

<section id="photos" style="display:none;">
    <h2>صورنا 📸</h2>
    <img src="image1.jpg">
    <img src="image2.jpg">
</section>

<section>
    <h2>ذكريات 💌</h2>
    <div class="memory">أول لقاء ❤️</div>
    <div class="memory">أحلى أيام ❤️</div>
</section>

</div>

<script>
const loginBtn=document.getElementById("loginBtn");
const password=document.getElementById("password");
const login=document.getElementById("login");
const error=document.getElementById("error");
const messagePage=document.getElementById("messagePage");
const typeText=document.getElementById("typeText");
const site=document.getElementById("site");
const music=document.getElementById("music");
const hearts=document.getElementById("hearts");

const message =
"❤️ بحبك ❤️\n\n" +
"وجودك غير حياتي\n" +
"وكل لحظة معاك كنز ❤️";

let i=0;

loginBtn.onclick = ()=>{
    if(password.value==="1912"){
        login.style.display="none";
        messagePage.style.display="flex";

        i=0;
        typeText.innerHTML="";
        typeWriter();

        // 🔥 تشغيل الصوت (مضمون بعد click)
        music.load();
        music.currentTime=0;
        music.play().catch(()=>{});

    } else {
        error.style.display="block";
    }
};

function typeWriter(){
    if(i<message.length){
        typeText.innerHTML += message[i]==="\n" ? "<br>" : message[i];
        i++;
        setTimeout(typeWriter,70);
    } else {
        setTimeout(()=>{
            messagePage.style.display="none";
            site.style.display="block";
        },800);
    }
}

function showPhotos(){
    document.getElementById("photos").style.display="block";
}

// hearts
setInterval(()=>{
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*20)+"px";
    hearts.appendChild(h);
    setTimeout(()=>h.remove(),8000);
},400);

// counter
const start=new Date();
setInterval(()=>{
    const d=Math.floor((new Date()-start)/86400000);
    document.getElementById("counter").innerHTML=
    `مع بعض بقالنا ${d} يوم ❤️`;
},1000);
</script>

</body>
</html>
